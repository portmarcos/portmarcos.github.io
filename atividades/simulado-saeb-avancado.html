<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulado SAEB Avançado — Prof. Marcos Cruz</title>

  <!-- Preview no WhatsApp -->
  <meta property="og:title" content="Simulado SAEB Avançado — Leitura de Textos 🎯">
  <meta property="og:description" content="9 questões sobre crônica, artigo de opinião e poema. Nível aprofundado.">
  <meta property="og:image" content="https://portmarcos.github.io/assets/img/og-capa.png">

  <link rel="icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/design-system.css">
</head>
<!-- A classe abaixo define a cor da página: Português = verde -->
<body class="materia-saeb">

  <div class="barra-tricolor"></div>
  <header class="cabecalho">
    <div class="container cabecalho-conteudo">
      <span class="marca"><a href="../index.html"><span class="pm-logo" aria-hidden="true" style="display:inline-flex;line-height:0;vertical-align:middle;margin-right:9px;filter:drop-shadow(0 2px 7px rgba(216,179,106,.42))"><svg width="36" height="36" viewBox="0 0 64 64" fill="none"><defs><linearGradient id="slr" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse"><stop stop-color="#EBCB84"/><stop offset=".5" stop-color="#D8B36A"/><stop offset="1" stop-color="#A855F7"/></linearGradient></defs><circle cx="32" cy="32" r="30" fill="#0C0A15"/><circle cx="32" cy="32" r="29" fill="none" stroke="url(#slr)" stroke-width="2"/><circle cx="32" cy="32" r="23.5" fill="none" stroke="#D8B36A" stroke-width="1" opacity=".5"/><text x="32" y="41" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-weight="700" font-size="25" fill="#F5F0E6">MC</text><circle cx="14.5" cy="32" r="1.6" fill="#D8B36A"/><circle cx="49.5" cy="32" r="1.6" fill="#D8B36A"/></svg></span>Portal Marcos Cruz</a></span>
    </div>
  </header>

  <main class="container" style="max-width:760px">
    <a class="voltar nao-imprimir" href="../index.html">← Voltar ao portal</a>
    <span class="etiqueta-materia">SAEB · SIMAVE · Avançado</span>
    <h1 id="quiz-titulo" style="margin-top:10px">…</h1>

    <!-- TELA 1: início -->
    <section id="tela-inicio" class="painel">
      <p id="quiz-descricao"></p>
      <div class="info-chips">
        <span class="tag" id="info-questoes"></span>
        <span class="tag" id="info-tempo"></span>
        <span class="tag" id="info-melhor" hidden>🏆</span>
      </div>
      <button id="btn-comecar" class="btn btn-primario btn-bloco">Começar ▶</button>
    </section>

    <!-- TELA 2: questão -->
    <section id="tela-questao" class="painel" hidden>
      <p class="progresso-texto" id="progresso"></p>
      <div class="timer-trilho" aria-hidden="true"><div class="timer-barra" id="timer-barra"></div></div>
      <h2 class="enunciado" id="enunciado"></h2>
      <div class="opcoes" id="opcoes"></div>
      <div class="explicacao" id="explicacao" role="status" hidden></div>
      <button id="btn-proxima" class="btn btn-primario btn-bloco" style="margin-top:18px" hidden></button>
    </section>

    <!-- TELA 3: resultado -->
    <section id="tela-final" class="painel placar-final" hidden>
      <h2>Resultado</h2>
      <div class="nota" id="nota-final"></div>
      <p id="nota-pct" style="font-weight:700"></p>
      <p class="melhor" id="nota-melhor"></p>
      <button id="btn-refazer" class="btn btn-primario btn-bloco">Refazer quiz 🔁</button>
      <a class="btn btn-secundario btn-bloco" style="margin-top:8px" href="../index.html">Voltar ao portal</a>
    </section>
  </main>

  <footer class="rodape"><div class="container">Portal Marcos Cruz · Prof. Marcos Cruz</div></footer>

  <!-- 1º: os dados · 2º: o confete (CDN) · 3º: o motor -->
  <script src="../dados/simulado-saeb-avancado.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.3/confetti.browser.min.js" defer></script>
  <script src="../assets/js/config-sheets.js"></script>
  <script src="../assets/js/quiz-engine.js"></script>
<script defer src="/assets/lantern.js"></script></body>
</html>
