name: 🚀 Deploy Pages (oficial)

on:
  push:
    branches:
      - main
      - v2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site-main

      - name: 📦 Checkout v2
        uses: actions/checkout@v4
        with:
          ref: v2
          path: site-v2
        continue-on-error: true

      - name: 🔧 Montar estrutura de deploy
        run: |
          mkdir -p deploy
          cp -r site-main/. deploy/
          rm -rf deploy/.git deploy/website/node_modules

          if [ -d "site-v2" ]; then
            echo "✅ Branch v2 encontrado — copiando para /v2/"
            mkdir -p deploy/v2
            cp -r site-v2/. deploy/v2/
            rm -rf deploy/v2/.git deploy/v2/website/node_modules
          else
            echo "⚠️  Branch v2 não encontrado — pulando"
          fi

          echo "📁 Estrutura final:"
          ls -la deploy/

      - name: ⚙️ Configurar Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
