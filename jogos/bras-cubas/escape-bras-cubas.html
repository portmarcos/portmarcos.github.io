<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Defunto Mestre — Brás Cubas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a227; --gold-lit: #e8c84a; --gold-dim: rgba(201,162,39,0.25);
      --bg:   #060401; --bg2: #110b02; --bg3: #1c1205;
      --cream:#f0ddb0; --cream2: rgba(240,221,176,0.75);
      --blue: #4a6a8a; --blue-dim: rgba(74,106,138,0.25);
      --red:  #7a1a1a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'IM Fell English', serif;
      display: flex;
      height: 100vh;
    }

    /* ═══════════════ LEFT PANEL ═══════════════ */
    #left {
      width: 220px; min-width: 220px;
      background: linear-gradient(170deg, #060401 0%, #100900 100%);
      border-right: 1px solid var(--gold-dim);
      display: flex; flex-direction: column; align-items: center;
      padding: 18px 14px; gap: 14px;
    }

    /* CANDLE */
    .candle { display:flex; flex-direction:column; align-items:center; }
    .flame {
      width: 11px; height: 18px;
      background: radial-gradient(ellipse at 50% 85%, #ffcc00 0%, #ff8800 55%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flicker 2.3s ease-in-out infinite;
      filter: blur(0.5px);
      position: relative;
    }
    .flame::after {
      content:''; position:absolute; bottom:-3px; left:50%; transform:translateX(-50%);
      width:3px; height:5px; background:#555; border-radius:2px;
    }
    .candlebody {
      width:16px; height:55px;
      background: linear-gradient(to right, #d0b880, #efe0b0, #d0b880);
      border-radius:2px;
    }
    @keyframes flicker {
      0%,100%{ transform:scaleX(1) scaleY(1) translateX(0); opacity:1; }
      20%    { transform:scaleX(0.88) scaleY(1.1) translateX(-1px); opacity:.9; }
      40%    { transform:scaleX(1.08) scaleY(.93) translateX(1px); opacity:1; }
      60%    { transform:scaleX(.94) scaleY(1.06) translateX(0); opacity:.95; }
      80%    { transform:scaleX(1.04) scaleY(.97) translateX(-1px); opacity:.92; }
    }

    /* PORTRAIT */
    #portrait {
      width:136px; height:170px;
      border:2px solid var(--gold);
      overflow:hidden; position:relative;
      box-shadow: 0 0 24px rgba(201,162,39,0.15), inset 0 0 30px rgba(0,0,0,0.5);
    }
    #portrait svg { width:100%; height:100%; }

    /* PROGRESS — PHASES */
    .section-label {
      font-family:'Cinzel',serif; font-size:.58rem;
      color:rgba(201,162,39,.5); letter-spacing:2.5px;
      text-align:center; text-transform:uppercase;
    }
    .phase-dots { display:flex; gap:8px; }
    .pdot {
      width:15px; height:15px;
      border:2px solid rgba(201,162,39,.3);
      border-radius:50%;
      transition: all .5s;
    }
    .pdot.active  { border-color:var(--gold); background:var(--gold); box-shadow:0 0 8px var(--gold); }
    .pdot.done    { border-color:#4a8a4a; background:#4a8a4a; }

    /* PROGRESS — QUESTIONS */
    .qdots { display:flex; gap:6px; }
    .qdot {
      width:11px; height:11px;
      border:1px solid rgba(201,162,39,.25);
      border-radius:50%; transition:.4s;
    }
    .qdot.ok   { background:#4a8a4a; border-color:#4a8a4a; }
    .qdot.err  { background:#7a2020; border-color:#7a2020; }
    .qdot.cur  { border-color:var(--gold); box-shadow:0 0 6px var(--gold); }

    /* TIMER */
    #timer-wrap { margin-top:auto; text-align:center; }
    #timer-lbl  { font-family:'Cinzel',serif; font-size:.55rem; color:rgba(201,162,39,.4); letter-spacing:2px; }
    #timer {
      font-family:'Cinzel Decorative',serif; font-size:1.55rem;
      color:var(--gold); letter-spacing:3px;
      transition: color .5s;
    }
    #timer.warn   { color:#e07820; }
    #timer.danger { color:#cc2222; animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ═══════════════ RIGHT PANEL ═══════════════ */
    #right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    #topbar {
      padding:9px 20px;
      border-bottom:1px solid var(--gold-dim);
      background:rgba(0,0,0,.35);
      display:flex; align-items:center; gap:14px;
    }
    #topbar h1 {
      font-family:'Cinzel Decorative',serif; font-size:.88rem;
      color:var(--gold); letter-spacing:2px;
    }
    #topbar .sub { font-size:.72rem; color:rgba(201,162,39,.4); font-style:italic; }

    #phase-strip {
      padding:5px 20px;
      border-bottom:1px solid var(--gold-dim);
      background:rgba(201,162,39,.04);
      font-family:'Cinzel',serif; font-size:.65rem;
      color:rgba(201,162,39,.55); letter-spacing:1px;
    }

    /* CHAT */
    #chat {
      flex:1; overflow-y:auto; padding:18px 20px;
      display:flex; flex-direction:column; gap:13px;
      scrollbar-width:thin; scrollbar-color:var(--gold-dim) transparent;
    }
    #chat::-webkit-scrollbar { width:3px; }
    #chat::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }

    .msg { display:flex; gap:9px; max-width:92%; animation:slideUp .3s ease; }
    .msg.bras   { align-self:flex-start; }
    .msg.player { align-self:flex-end; flex-direction:row-reverse; }
    .msg.sys    { align-self:center; max-width:75%; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(9px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .avatar {
      width:30px; min-width:30px; height:30px;
      border:1px solid; border-radius:2px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.5px;
    }
    .bras   .avatar { border-color:var(--gold);  color:var(--gold); }
    .player .avatar { border-color:var(--blue);  color:var(--blue); }

    .bubble {
      padding:10px 14px; line-height:1.65;
      font-size:.88rem; border-radius:2px;
    }
    .bras   .bubble {
      background:linear-gradient(135deg, #1c1205, #130e03);
      border:1px solid rgba(201,162,39,.35); border-left:3px solid var(--gold);
      color:var(--cream);
    }
    .player .bubble {
      background:linear-gradient(135deg, #0a1520, #060e17);
      border:1px solid rgba(74,106,138,.35); border-right:3px solid var(--blue);
      color:#b8d0e8;
    }
    .sys .bubble {
      background:rgba(201,162,39,.06);
      border:1px dashed rgba(201,162,39,.22);
      color:rgba(201,162,39,.65); font-style:italic;
      font-size:.78rem; text-align:center; padding:7px 14px;
    }

    /* sentence block inside bubble */
    .sentence {
      margin-top:9px; padding:9px 13px;
      background:rgba(201,162,39,.06);
      border:1px solid rgba(201,162,39,.2); border-left:3px solid var(--gold);
      font-style:italic; font-size:.92rem;
    }
    .blank {
      display:inline-block; min-width:36px;
      border-bottom:2px solid var(--gold);
      color:var(--gold); font-style:normal; font-weight:700;
      text-align:center; vertical-align:bottom;
    }

    /* TYPING */
    #typing {
      display:none; align-self:flex-start;
      padding:10px 14px;
      background:linear-gradient(135deg,#1c1205,#130e03);
      border:1px solid rgba(201,162,39,.3); border-left:3px solid var(--gold);
      border-radius:2px; animation:slideUp .3s;
    }
    .dots { display:flex; gap:5px; align-items:center; }
    .dots span {
      width:7px; height:7px; background:var(--gold);
      border-radius:50%; animation:bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce {
      0%,80%,100%{transform:translateY(0);opacity:.5}
      40%{transform:translateY(-8px);opacity:1}
    }

    /* ═══════════════ INTERACTION AREA ═══════════════ */
    #interact {
      border-top:1px solid var(--gold-dim);
      background:rgba(0,0,0,.2);
      padding:13px 20px; min-height:70px;
      display:flex; align-items:center; justify-content:center;
    }

    .btn-row  { display:flex; gap:10px; width:100%; max-width:500px; }
    .btn-gold {
      flex:1; padding:13px; border:2px solid var(--gold);
      background:transparent; color:var(--gold);
      font-family:'Cinzel',serif; font-size:.88rem; font-weight:700;
      letter-spacing:2.5px; cursor:pointer; transition:.22s;
    }
    .btn-gold:hover { background:var(--gold); color:var(--bg); }
    .btn-blue {
      flex:1; padding:13px; border:2px solid var(--blue);
      background:transparent; color:var(--blue);
      font-family:'Cinzel',serif; font-size:.88rem; font-weight:700;
      letter-spacing:2.5px; cursor:pointer; transition:.22s;
    }
    .btn-blue:hover { background:var(--blue); color:var(--bg); }
    .btn-ghost {
      width:100%; max-width:440px; padding:11px;
      border:1px solid rgba(201,162,39,.35);
      background:rgba(201,162,39,.05);
      color:var(--gold); font-family:'Cinzel',serif;
      font-size:.75rem; letter-spacing:2px; cursor:pointer; transition:.22s;
    }
    .btn-ghost:hover { background:rgba(201,162,39,.12); border-color:var(--gold); }

    .book-form { display:flex; flex-direction:column; gap:9px; width:100%; max-width:500px; }
    .book-row  { display:flex; gap:8px; }
    .book-row input {
      flex:1; padding:9px 13px;
      background:rgba(0,0,0,.5); border:1px solid rgba(201,162,39,.45);
      color:var(--cream); font-family:'IM Fell English',serif; font-size:.88rem;
      outline:none; transition:border-color .2s;
    }
    .book-row input:focus { border-color:var(--gold); }
    .book-row input::placeholder { color:rgba(201,162,39,.3); font-style:italic; }
    .btn-confirm {
      padding:9px 18px; background:var(--gold); color:var(--bg);
      border:none; font-family:'Cinzel',serif; font-size:.78rem; font-weight:700;
      letter-spacing:1px; cursor:pointer; transition:opacity .2s;
    }
    .btn-confirm:hover { opacity:.85; }

    /* ═══════════════ VICTORY ═══════════════ */
    #victory {
      display:none; position:fixed; inset:0;
      background:rgba(3,2,0,.94);
      z-index:200; align-items:center; justify-content:center;
      flex-direction:column; text-align:center; gap:18px; padding:40px;
    }
    #victory.show { display:flex; }
    #victory h1 {
      font-family:'Cinzel Decorative',serif; font-size:2rem;
      color:var(--gold); letter-spacing:5px;
    }
    #victory p { font-size:1rem; color:var(--cream2); max-width:520px; line-height:1.75; }
    .ornament { color:var(--gold); letter-spacing:10px; font-size:1.1rem; }

    /* CONFETTI */
    .confetti {
      position:fixed; width:8px; height:8px;
      z-index:300; pointer-events:none;
      animation: fall linear forwards;
    }
    @keyframes fall {
      from { transform:translateY(-20px) rotate(0deg); opacity:1; }
      to   { transform:translateY(105vh)  rotate(720deg); opacity:0; }
    }

    @media(max-width:680px){ #left { display:none; } }

    /* ═══════════════ PENALIDADE ═══════════════ */
    #penalty {
      display:none; position:fixed; inset:0; z-index:600;
      background:rgba(4,0,0,0.93);
      flex-direction:column; align-items:center; justify-content:center;
      gap:18px; text-align:center; padding:40px;
      backdrop-filter: blur(3px);
    }
    #penalty.show { display:flex; }
    .pen-skull {
      font-size:5rem; line-height:1;
      animation: skullPulse 2s ease-in-out infinite;
    }
    @keyframes skullPulse {
      0%,100%{ transform:scale(1) rotate(-3deg); opacity:.85; }
      50%    { transform:scale(1.08) rotate(3deg); opacity:1; }
    }
    .pen-title {
      font-family:'Cinzel Decorative',serif; font-size:1.3rem;
      color:#c9a227; letter-spacing:4px;
    }
    .pen-quote {
      font-family:'IM Fell English',serif; font-style:italic;
      color:rgba(240,221,176,.75); max-width:440px; line-height:1.7; font-size:.95rem;
    }
    #pen-cd {
      font-family:'Cinzel Decorative',serif; font-size:4rem;
      color:#cc2222; letter-spacing:6px;
      animation: cdPulse 1s ease-in-out infinite;
    }
    @keyframes cdPulse {
      0%,100%{ text-shadow:0 0 10px #cc2222; }
      50%    { text-shadow:0 0 30px #cc2222, 0 0 60px #880000; }
    }
    .pen-sub {
      font-family:'Cinzel',serif; font-size:.65rem;
      color:rgba(201,162,39,.4); letter-spacing:3px;
    }

    /* Crânio 3D */
    #skull-3d {
      width:190px; height:190px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid rgba(201,162,39,0.35);
      animation: skullFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 28px rgba(200,20,10,0.6))
              drop-shadow(0 0 8px rgba(201,162,39,0.4));
    }
    @keyframes skullFloat {
      0%,100%{ transform: translateY(0)   scale(1)    rotate(-2deg); }
      30%    { transform: translateY(-14px) scale(1.04) rotate(1deg);  }
      60%    { transform: translateY(-8px)  scale(1.02) rotate(-1deg); }
    }
    .pen-skull { line-height:1; }
    #mute-btn {
      position:fixed; bottom:14px; right:14px; z-index:400;
      width:36px; height:36px;
      background:rgba(201,162,39,.1); border:1px solid rgba(201,162,39,.3);
      color:rgba(201,162,39,.6); font-size:1rem; cursor:pointer;
      border-radius:2px; transition:.2s;
      display:flex; align-items:center; justify-content:center;
    }
    #mute-btn:hover { background:rgba(201,162,39,.2); color:var(--gold); }
  </style>
</head>
<body>

<!-- ═══════════ LEFT PANEL ═══════════ -->
<div id="left">
  <div class="candle"><div class="flame"></div><div class="candlebody"></div></div>

  <div id="portrait">
    <svg viewBox="0 0 136 170" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="vig" cx="50%" cy="50%" r="55%">
          <stop offset="55%" stop-color="transparent"/>
          <stop offset="100%" stop-color="#060401" stop-opacity=".85"/>
        </radialGradient>
        <radialGradient id="facelight" cx="42%" cy="38%" r="55%">
          <stop offset="0%" stop-color="#7a5030"/>
          <stop offset="100%" stop-color="#5a3820"/>
        </radialGradient>
      </defs>
      <rect width="136" height="170" fill="#060301"/>
      <!-- coat / body -->
      <path d="M 0,170 L 28,108 L 50,97 L 68,120 L 86,97 L 108,108 L 136,170 Z" fill="#160c03"/>
      <!-- lapels -->
      <path d="M 50,97 L 68,120 L 42,155 L 28,108 Z" fill="#231508"/>
      <path d="M 86,97 L 68,120 L 94,155 L 108,108 Z" fill="#231508"/>
      <!-- waistcoat stripe -->
      <path d="M 63,97 L 73,97 L 70,116 L 68,119 L 66,116 Z" fill="#c8a030"/>
      <!-- cravat knot -->
      <path d="M 62,94 L 68,99 L 74,94 L 71,88 L 68,91 L 65,88 Z" fill="#8a1818"/>
      <!-- collar -->
      <polygon points="62,91 54,84 62,84" fill="#ddd0a0"/>
      <polygon points="74,91 82,84 74,84" fill="#ddd0a0"/>
      <!-- neck -->
      <rect x="62" y="82" width="12" height="13" rx="3" fill="#6a4025"/>
      <!-- head -->
      <ellipse cx="68" cy="59" rx="28" ry="32" fill="url(#facelight)"/>
      <!-- hair mass -->
      <path d="M 41,51 Q 44,26 68,24 Q 92,26 95,51 Q 87,38 68,36 Q 49,38 41,51 Z" fill="#1a0b03"/>
      <!-- sideburns -->
      <path d="M 41,51 Q 37,63 39,78 L 44,70 L 47,58 Z" fill="#1a0b03"/>
      <path d="M 95,51 Q 99,63 97,78 L 92,70 L 89,58 Z" fill="#1a0b03"/>
      <!-- hair part line -->
      <path d="M 68,24 Q 67,33 65,43" stroke="#0d0601" stroke-width="1.8" fill="none" opacity=".7"/>
      <!-- eyebrows -->
      <path d="M 50,52 Q 58,48 63,50" stroke="#2a1504" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 86,52 Q 78,48 73,50" stroke="#2a1504" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- left eye -->
      <ellipse cx="58" cy="59" rx="6" ry="5" fill="#b08040"/>
      <ellipse cx="58" cy="59" rx="3.3" ry="3.3" fill="#0c0600"/>
      <ellipse cx="56.5" cy="57.5" rx="1.2" ry="1" fill="#fff" opacity=".45"/>
      <!-- right eye -->
      <ellipse cx="78" cy="59" rx="6" ry="5" fill="#b08040"/>
      <ellipse cx="78" cy="59" rx="3.3" ry="3.3" fill="#0c0600"/>
      <ellipse cx="76.5" cy="57.5" rx="1.2" ry="1" fill="#fff" opacity=".45"/>
      <!-- eyelid shadows -->
      <path d="M 52,57 Q 58,54 64,57" fill="#3a2010" opacity=".35"/>
      <path d="M 72,57 Q 78,54 84,57" fill="#3a2010" opacity=".35"/>
      <!-- nose -->
      <path d="M 68,64 Q 64,72 66,76 Q 68,78 70,76 Q 72,72 68,64 Z" fill="#5a3018"/>
      <ellipse cx="65.5" cy="75" rx="2.5" ry="1.4" fill="#3a1e0c" opacity=".7"/>
      <ellipse cx="70.5" cy="75" rx="2.5" ry="1.4" fill="#3a1e0c" opacity=".7"/>
      <!-- mustache -->
      <path d="M 54,78 Q 60,84 68,82 Q 76,84 82,78" fill="#1a0a02" stroke="#1a0a02" stroke-width=".5"/>
      <path d="M 54,78 Q 59,81 62,79 L 62,78 Q 58,77 54,78 Z" fill="#251206"/>
      <path d="M 82,78 Q 77,81 74,79 L 74,78 Q 78,77 82,78 Z" fill="#251206"/>
      <!-- chin -->
      <path d="M 48,84 Q 68,96 88,84" stroke="#4a2810" stroke-width="1" fill="none" opacity=".4"/>
      <!-- cheek flush -->
      <ellipse cx="47" cy="66" rx="10" ry="8" fill="#7a2818" opacity=".12"/>
      <ellipse cx="89" cy="66" rx="10" ry="8" fill="#7a2818" opacity=".12"/>
      <!-- vignette -->
      <rect width="136" height="170" fill="url(#vig)"/>
      <!-- name plate -->
      <rect x="0" y="154" width="136" height="16" fill="#060301" opacity=".85"/>
      <text x="68" y="165" text-anchor="middle" fill="#c9a227"
            font-family="'IM Fell English', serif" font-size="7.5" letter-spacing="2.5">BRÁS CUBAS</text>
      <!-- corners -->
      <text x="3" y="12" fill="#c9a227" font-size="8" opacity=".55">✦</text>
      <text x="123" y="12" fill="#c9a227" font-size="8" opacity=".55">✦</text>
    </svg>
  </div>

  <div class="section-label">DESAFIO</div>
  <div class="phase-dots">
    <div class="pdot" id="pd0"></div>
    <div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div>
    <div class="pdot" id="pd3"></div>
  </div>

  <div class="section-label">QUESTÕES</div>
  <div class="qdots">
    <div class="qdot" id="qd0"></div>
    <div class="qdot" id="qd1"></div>
    <div class="qdot" id="qd2"></div>
    <div class="qdot" id="qd3" style="display:none"></div>
  </div>

  <div class="candle"><div class="flame"></div><div class="candlebody"></div></div>

  <div id="timer-wrap">
    <div id="timer-lbl">TEMPO</div>
    <div id="timer">30:00</div>
  </div>
</div>

<!-- ═══════════ RIGHT PANEL ═══════════ -->
<div id="right">
  <div id="topbar">
    <h1>O DEFUNTO MESTRE</h1>
    <span class="sub">— Escape Room Literário —</span>
  </div>
  <div id="phase-strip">📜 &nbsp;MEMÓRIAS PÓSTUMAS DE BRÁS CUBAS · Capítulos I–XVII · Crase</div>

  <div id="chat">
    <div id="typing">
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div id="interact">
    <span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Invocando o defunto autor…</span>
  </div>
</div>

<!-- ═══════════ VICTORY ═══════════ -->
<div id="victory">
  <div class="ornament">✦ ✦ ✦</div>
  <h1>BRAVO, MORTAIS!</h1>
  <div class="ornament">◆</div>
  <p id="vtext"></p>
  <div class="ornament">✦ ✦ ✦</div>
  <button class="btn-ghost" style="max-width:260px;margin-top:10px"
    onclick="location.reload()">▸ JOGAR NOVAMENTE</button>
</div>

<!-- ═══════════ PENALIDADE ═══════════ -->
<div id="penalty">

<!-- botão mudo -->
<button id="mute-btn" onclick="toggleMute()" title="Silenciar música">🔊</button>

<script>
/* ═══════════════════════════════════════════════
   MÚSICA FÚNEBRE — Web Audio API (Marcha Fúnebre, Chopin Op.35)
═══════════════════════════════════════════════ */
let audioCtx = null, masterGain = null, muted = false;

function startMusic() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.12;
    masterGain.connect(audioCtx.destination);
    playLoop();
  } catch(e) {}
}

function toggleMute() {
  if (!audioCtx) return;
  muted = !muted;
  masterGain.gain.setTargetAtTime(muted ? 0 : 0.12, audioCtx.currentTime, 0.3);
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

// Marcha Fúnebre de Chopin (simplificada, Bb menor)
const BPM = 50, BEAT = 60 / BPM;
const FREQ = {
  Bb2:116.54, F3:174.61, Bb3:233.08,
  C4:261.63,  Db4:277.18, Eb4:311.13,
  F4:349.23,  Gb4:369.99, Ab4:415.30, Bb4:466.16
};
// [nota, duração em beats]
const MELODY = [
  ['Bb3',.5],['Bb3',.5],['Bb3',.5],['F3',1.5],
  ['Bb3',.5],['Bb3',.5],['Bb3',.5],['F3',1.5],
  ['Bb3',.33],['C4',.33],['Db4',.67],['Eb4',.5],
  ['F4',.75],['F4',.25],['Eb4',.5],
  ['Db4',.5],['Eb4',.5],['F4',.5],['Bb3',2],
  [null,2]
];
const BASS = [
  ['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],
  ['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],
  ['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],
  ['F3',1],['F3',1],['Bb2',2],[null,2]
];

function playOrganNote(freq, t, dur, vol=1) {
  if (!audioCtx || !freq) return;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.05*vol, t+0.08);
  g.gain.setValueAtTime(0.05*vol, t+dur-0.12);
  g.gain.linearRampToValueAtTime(0, t+dur);
  g.connect(masterGain);
  [1, 2, 3, 4].forEach((h, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * h;
    const hg = audioCtx.createGain();
    hg.gain.value = [1,.55,.25,.1][i];
    o.connect(hg); hg.connect(g);
    o.start(t); o.stop(t + dur + 0.2);
  });
}

function playLoop() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + 0.15;
  let mt = t0, bt = t0;
  MELODY.forEach(([n, d]) => {
    playOrganNote(FREQ[n], mt, d*BEAT*0.88, 1.0);
    mt += d * BEAT;
  });
  BASS.forEach(([n, d]) => {
    playOrganNote(FREQ[n], bt, d*BEAT*0.7, 0.55);
    bt += d * BEAT;
  });
  const total = MELODY.reduce((s,[,d])=>s+d,0) * BEAT * 1000;
  setTimeout(playLoop, total - 200);
}

/* ═══════════════════════════════════════════════
   PENALIDADE (2 minutos)
═══════════════════════════════════════════════ */
const PEN_QUOTES = [
  '"Engano digno de um vivo — e vivos, como sabemos, erram muito." — Brás Cubas',
  '"A crase não perdoa a ignorância. Nem eu, do alto do meu caixão." — Brás Cubas',
  '"Lamentável. Esperemos juntos que o tempo cure esta ferida gramatical." — Brás Cubas',
  '"Do além, vejo vosso erro com clareza cristalina. Esperem." — Brás Cubas',
  '"Errar é humano. Pagar a penitência, também." — Brás Cubas',
];
let penInterval = null;

function startPenalty() {
  G.wrongCount++;
  // Progressivo: 1min, 2min, 3min, 3min, 3min...
  const mins = Math.min(G.wrongCount, 3);
  const labels = ['', '1ª VEZ — 1 MINUTO', '2ª VEZ — 2 MINUTOS', '3ª VEZ — 3 MINUTOS'];
  const labelExtra = G.wrongCount > 3 ? `${G.wrongCount}ª VEZ — 3 MINUTOS` : labels[mins];

  document.getElementById('pen-quote').textContent =
    PEN_QUOTES[Math.floor(Math.random()*PEN_QUOTES.length)];
  document.getElementById('pen-time-lbl').textContent = labelExtra;
  document.getElementById('penalty').classList.add('show');

  if (masterGain && !muted)
    masterGain.gain.setTargetAtTime(0.04, audioCtx.currentTime, 0.5);

  let rem = mins * 60;
  const cd = document.getElementById('pen-cd');
  cd.textContent = `${mins}:00`;

  clearInterval(penInterval);
  penInterval = setInterval(() => {
    rem--;
    const m = Math.floor(rem/60), s = rem%60;
    cd.textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (rem <= 0) {
      clearInterval(penInterval);
      document.getElementById('penalty').classList.remove('show');
      if (masterGain && !muted)
        masterGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.5);
    }
  }, 1000);
}

const $chat    = () => document.getElementById('chat');
const $typing  = () => document.getElementById('typing');
const $interact= () => document.getElementById('interact');

function addMsg(type, text, extra='') {
  const chat = $chat();
  const div  = document.createElement('div');
  div.className = `msg ${type}`;
  const avatarMap = { bras:'B.C.', player:'VÓS' };
  const avatarColor = type==='player' ? 'border-color:var(--blue);color:var(--blue)' : '';
  const av = (type==='bras'||type==='player')
    ? `<div class="avatar" style="${avatarColor}">${avatarMap[type]}</div>` : '';
  div.innerHTML = `${av}<div class="bubble">${text}${extra}</div>`;
  chat.insertBefore(div, $typing());
  chat.scrollTop = chat.scrollHeight;
}

function showTyping()  { $typing().style.display='block'; $chat().scrollTop=99999; }
function hideTyping()  { $typing().style.display='none'; }
function setInteract(html) { $interact().innerHTML = html; }

function dots() {
  const ph = G.phase;
  for (let i=0;i<4;i++){
    const d = document.getElementById(`pd${i}`);
    if(d) d.className = 'pdot' + (i<ph?' done': i===ph?' active':'');
  }
  const totalQs = G.phase < PHASES.length ? PHASES[G.phase].qs.length : 3;
  const d3 = document.getElementById('qd3');
  if(d3) d3.style.display = totalQs > 3 ? 'block' : 'none';
  for (let i=0;i<4;i++){
    const d = document.getElementById(`qd${i}`);
    if(!d) continue;
    d.className = 'qdot'+(i<G.qIdx?(G.answered[i]?' ok':' err'):i===G.qIdx&&!G.qsDone?' cur':'');
  }
}

function sentence(q) {
  return `<div class="sentence">"${q.b} <span class="blank">___</span> ${q.a}"</div>`;
}

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

/* ═══════════════════════════════════════════════
   BRÁS CUBAS — respostas pré-escritas (sem API)
═══════════════════════════════════════════════ */
function bras(situation, extra={}) {
  const pi  = Math.min(G.phase, PHASES.length-1);
  const ph  = PHASES[pi];
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  /* ── Intro ── */
  const INTRO = `Sou Brás Cubas — o defunto autor, como me intitulei nas minhas Memórias Póstumas. Escrevi do além-túmulo com a liberdade de quem nada tem a temer, e é dessa liberdade que me valho agora para vos testar. Ao longo deste jogo, farei perguntas sobre crase — essa pequena marca que tantos ignoram. A cada fase superada, revelarei pistas sobre um livro que devereis encontrar na biblioteca. O nome jamais direi diretamente. Isso seria demasiado simples para um defunto do meu calibre.`;

  /* ── Intro de cada fase ── */
  const PHASE_INTRO = [
    `Da janela do além, observo os patriotas com uma mistura de curiosidade e desdém. Eu dediquei minha existência à vaidade pessoal e mal me lembrava da pátria em dias de chuva. Mas há um personagem que a amou com uma dedicação que eu nunca fui capaz de sentir — e esse amor o destruiu. Esta fase testa os vossos conhecimentos de crase. As questões virão, e depois revelarei pistas sobre esse homem singular que acreditou no Brasil mais do que o Brasil merecia.`,
    `Ah, Marcela! Amei-a durante quinze meses e despensei por ela doze contos de réis — não incluídos os jantares e as flores. Que mestre fui eu na arte de me arruinar por uma mulher bela e indiferente. Mas deixemos a saudade de lado. As questões de crase aguardam, e nas pistas que revelarei depois encontrareis o caminho para outro grande amor da literatura brasileira.`,
    `Meu pai decidiu que eu seria padre. Eu decidi que não. Partimos para Coimbra num acordo tácito entre a vontade paterna e a minha resignação momentânea. Coimbra ensinou-me pouco de teologia e muito de vida. As questões de crase virão, e depois darei pistas sobre um narrador que, assim como eu, tentou reconstruir o passado com palavras — e não tem certeza se conseguiu.`,
    `Chegamos ao último desafio. Da janela de Botafogo, eu via o mar e fingia não ver a miséria. Era um privilégio de classe que eu exercia com elegância. As pistas desta fase levarão a um escritor que enxergou o que eu preferia ignorar — e escreveu sobre isso com crueza que me constrange até hoje.`,
  ];

  /* ── Intro de cada questão ── */
  const Q_INTRO = [
    `Atenção, mortais. Observem a frase abaixo e escolham a forma correta para a lacuna.`,
    `Do alto do meu caixão, apresento-vos mais uma sentença. Escolham com cuidado — a crase não perdoa o descuido.`,
    `Uma nova frase se apresenta. Lembrem-se: há crase apenas quando a preposição A encontra o artigo A feminino — ou certos pronomes demonstrativos. Escolham.`,
    `Contemplem esta frase com atenção. A resposta errada tem consequências — como tudo na vida e na morte.`,
    `Mais uma questão. Concentrem-se e escolham a forma correta para a lacuna.`,
  ];

  /* ── Acerto ── */
  function correctR() { return pick([
    `Muito bem! ${extra.label} — exatamente. ${extra.rule} Vejo que a gramática ainda não vos é completamente estranha, o que é reconfortante para um defunto como eu.`,
    `Correto! ${extra.label}. ${extra.rule} Há esperança para vocês ainda.`,
    `Acertastes! ${extra.label} — forma correta. ${extra.rule} Que satisfação rara, a de ver a gramática respeitada.`,
    `Exato. ${extra.label}. ${extra.rule} Não é difícil quando se para para pensar — o problema é que raramente se para.`,
  ]); }

  /* ── Erro ── */
  function wrongR() { return pick([
    `Incorreto. A forma correta é ${extra.label}. ${extra.rule} Não se envergonhem — o erro é da condição humana. A penitência, porém, é minha prerrogativa.`,
    `Engano. ${extra.label} seria o correto. ${extra.rule} Cometestes o erro mais comum entre os vivos: a pressa.`,
    `Lamentável. A resposta certa é ${extra.label}. ${extra.rule} Do além, vejo o erro com mais clareza do que vós.`,
    `Não. A forma correta é ${extra.label}. ${extra.rule} A crase tem regras — e as regras existem para ser aprendidas, não ignoradas.`,
  ]); }

  /* ── Fim das questões ── */
  const QS_DONE = [
    `As questões desta fase estão encerradas. Erraram o que erraram, acertaram o que acertaram — a vida é assim, e a morte também. Agora a parte mais intrigante: revelarei pistas sobre um livro que devereis encontrar na biblioteca. Prestem atenção — não sou dado a repetições.`,
    `Encerramos as questões desta fase. Agora começa a verdadeira caçada: revelarei, em pistas, a identidade de um livro escondido nas prateleiras. Sejam perspicazes — o óbvio raramente é a resposta.`,
    `As questões terminaram. O que se segue é o exercício da dedução — competência que os vivos possuem mas raramente utilizam. Revelarei pistas sobre um livro. Prestem atenção em cada detalhe, pois serei deliberadamente vago.`,
    `Última rodada de questões encerrada. As pistas que darei serão suficientes para quem pensa — e insuficientes para quem não pensa. Vós escolheis em qual categoria se encaixar.`,
  ];

  /* ── Pistas ── */
  function hintR() {
    const ini = pick([`Ouçam com atenção — esta pista não será repetida.`, `Do além, sussurro o seguinte.`, `Prestem atenção ao que revelarei agora.`]);
    const fim = pick([`Digam-me o título do livro quando o descobrirem.`, `Já sabem o suficiente para tentar. Qual é o título?`, `Reflitam sobre isso. Qual livro estou descrevendo?`]);
    return `${ini} ${ph.hints[G.hints]} ${fim}`;
  }

  /* ── Livro errado ── */
  const WRONG_BOOK = [
    `"${extra.guess||'?'}" — não é esse. ${G.hints<3?'Há mais pistas a revelar. Aguardem.':'Releiam as pistas com atenção.'}`,
    `Não. "${extra.guess||'?'}" não é o livro que procuro. ${G.hints<3?'Revelarei mais uma pista.':'As respostas estão nas pistas. Pensem.'}`,
    `Incorreto. Não é "${extra.guess||'?'}". ${G.hints<3?'Ainda há pistas por vir.':'Releiam com mais cuidado.'}`,
  ];

  /* ── Livro certo ── */
  const RIGHT_BOOK = [
    `Exatamente! Triste Fim de Policarpo Quaresma, de Lima Barreto. Quaresma amou a pátria com uma intensidade que o levou ao hospício e ao pelotão de fuzilamento — um amor tão puro e ingênuo que o próprio Brasil não soube o que fazer com ele. O bilhete com a próxima pista está escondido dentro desse livro, na biblioteca. O próximo desafio aguarda.`,
    `Correto! Iracema, de José de Alencar — "lábio de mel", a índia que amou Martim e pagou com a vida o preço desse amor. Assim como Marcela me custou doze contos de réis, o amor de Iracema custou tudo. O bilhete está dentro do livro. Preparem-se para o próximo desafio.`,
    `Muito bem! Dom Casmurro, de Machado de Assis — outro narrador que não é de se fiar, como eu. Bentinho passou a vida tentando reatar as duas pontas da vida, e não tenho certeza se conseguiu. O bilhete está dentro do livro. Quase chegamos ao fim — mas o maior desafio ainda está por vir.`,
    `Correto! O Cortiço, de Aluísio Azevedo — o Rio de Janeiro que eu fingia não ver da janela de Botafogo. O bilhete está dentro do livro. Os quatro livros foram encontrados. Mas o jogo não terminou — reservei para o final o enigma que exige não apenas memória, mas inteligência.`,
  ];

  /* ── Revelar livro ── */
  const REVEAL_BOOK = [
    `O livro é Triste Fim de Policarpo Quaresma, de Lima Barreto — o major que amou o Brasil com tanta paixão que o Brasil o matou por isso. O bilhete está escondido dentro do livro, na biblioteca. Busquem-no — o próximo desafio aguarda.`,
    `O livro é Iracema, de José de Alencar — a índia cujo nome significa "lábio de mel". O bilhete está dentro do livro. Sigam em frente.`,
    `O livro é Dom Casmurro, de Machado de Assis. Bentinho, o narrador ciumento, dá nome ao livro com o apelido que os vizinhos lhe puseram. O bilhete está lá dentro.`,
    `O livro é O Cortiço, de Aluísio Azevedo — a habitação coletiva que eu preferia ignorar. O bilhete está dentro do livro. E agora — o enigma final.`,
  ];

  /* ── Enigma final ── */
  const FINAL_ENIGMA = `Quatro livros percorridos, quatro segredos arrancados do silêncio. Mas o jogo ainda não terminou — reservei para o final o enigma que exige não apenas memória, mas inteligência. Cada livro guarda uma resposta. Nas respostas, encontrareis o enigma de 4 letras. Descobri-lo. Escrevam-no num papel — e passem-no por baixo da porta.`;

  /* ── Enigma errado ── */
  const FINAL_WRONG = [
    `"${extra.guess||'?'}" — não é essa a palavra. Releiam as quatro perguntas. Cada livro tem uma resposta simples, de uma palavra. Pensem: que documento Quaresma enviou ao Parlamento em tupi? O nome da índia significava o quê? Os olhos de Capitu eram comparados ao quê? E quem seduziu Jerônimo?`,
    `Não. Observem melhor: quatro perguntas, quatro respostas, cada uma com uma palavra. O enigma está nelas. Não procurem complicar o que é simples.`,
    `Incorreto. Quatro respostas, quatro palavras. O enigma está nelas — não preciso dizer mais do que isso.`,
  ];

  /* ── Vitória ── */
  const VICTORY = `E assim — com inteligência que me orgulha — descobristes a palavra. AMOR. O amor que leva Quaresma ao fuzilamento pela pátria, que mata Iracema pelo guerreiro branco, que obceca Bentinho pelos olhos de Capitu, que transforma Jerônimo pela dança de Rita. O amor, meus caros, é o motor de toda grande literatura — e talvez de toda grande loucura. Parabéns. Podeis abrir a porta.`;

  const MAP = {
    intro: INTRO,
    phase_intro: PHASE_INTRO[pi],
    q_intro: pick(Q_INTRO),
    correct: correctR(),
    wrong: wrongR(),
    qs_done: QS_DONE[pi],
    hint: hintR(),
    wrong_book: pick(WRONG_BOOK),
    right_book: RIGHT_BOOK[pi],
    reveal_book: REVEAL_BOOK[pi],
    final_enigma_intro: FINAL_ENIGMA,
    final_wrong: pick(FINAL_WRONG),
    victory: VICTORY,
  };

  // Simula pequeno delay para manter o ritmo do jogo
  return new Promise(resolve =>
    setTimeout(() => resolve(MAP[situation] || 'Brás Cubas pondera em silêncio.'),
    500 + Math.random()*700)
  );
}


/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
async function init() {
  dots(); startTimer();
  // Música começa no primeiro clique do usuário (exigência dos navegadores)
  document.addEventListener('click', () => {
    if (!audioCtx) startMusic();
  }, { once: true });
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Invocando o defunto autor…</span>');
  showTyping();
  const txt = await bras('intro');
  hideTyping(); addMsg('bras', txt);
  await delay(1200); startPhase();
}

async function startPhase() {
  G.qIdx=0; G.hints=0; G.qsDone=false;
  G.bookMode=false; G.attempts=0; G.answered=[];
  dots();
  document.getElementById('phase-strip').textContent = PHASES[Math.min(G.phase,3)].strip;
  showTyping();
  const txt = await bras('phase_intro');
  hideTyping(); addMsg('bras', txt);
  await delay(1100); askQuestion();
}

async function askQuestion() {
  if (G.busy) return;
  dots();
  showTyping();
  const txt = await bras('q_intro');
  hideTyping();
  const q = PHASES[G.phase].qs[G.qIdx];
  addMsg('bras', txt, sentence(q));
  setInteract(`
    <div class="btn-row">
      <button class="btn-gold" onclick="answer(true)">À — COM CRASE</button>
      <button class="btn-blue" onclick="answer(false)">A — SEM CRASE</button>
    </div>`);
}

async function answer(chose) {
  if (G.busy) return; G.busy=true;
  const q    = PHASES[G.phase].qs[G.qIdx];
  const ok   = (chose === q.crase);
  addMsg('player', chose ? '— À (com crase)' : '— A (sem crase)');
  G.answered.push(ok); dots();
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás pondera…</span>');
  showTyping();
  const txt = await bras(ok?'correct':'wrong',
    {b:q.b, a:q.a, label:q.label, rule:q.rule, chose: chose?'à':'a'});
  hideTyping(); addMsg('bras', txt);
  G.qIdx++; G.busy=false;
  if (!ok) setTimeout(startPenalty, 800);
  const totalQs = PHASES[G.phase].qs.length;
  if (G.qIdx < totalQs) {
    setInteract(`<button class="btn-ghost" onclick="askQuestion()">▸ PRÓXIMA QUESTÃO</button>`);
  } else {
    G.qsDone = true; dots();
    setInteract(`<button class="btn-ghost" onclick="transHints()">▸ RECEBER PRIMEIRA PISTA</button>`);
  }
}

async function transHints() {
  if (G.busy) return; G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás prepara a pista…</span>');
  showTyping();
  const txt = await bras('qs_done');
  hideTyping(); addMsg('bras', txt);
  G.busy=false;
  setInteract(`<button class="btn-ghost" onclick="giveHint()">▸ VER PISTA Nº 1</button>`);
}

async function giveHint() {
  if (G.busy) return;
  if (G.hints >= 3) { revealBook(); return; }
  G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás sussurra do além…</span>');
  showTyping();
  const txt = await bras('hint');
  hideTyping(); addMsg('bras', txt);
  G.hints++; G.bookMode=true; G.busy=false;
  showBookInput();
}

function showBookInput() {
  const nextLabel = G.hints < 3 ? `▸ PISTA Nº ${G.hints+1}` : '▸ REVELAR O LIVRO';
  setInteract(`
    <div class="book-form">
      <div class="book-row">
        <input id="bi" type="text" placeholder="Digite o título do livro…"
          onkeydown="if(event.key==='Enter')guessBook()"/>
        <button class="btn-confirm" onclick="guessBook()">CONFIRMAR</button>
      </div>
      <button class="btn-ghost" onclick="giveHint()">${nextLabel}</button>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById('bi'); if(el)el.focus(); },80);
}

async function guessBook() {
  if (G.busy) return;
  const el = document.getElementById('bi'); if(!el) return;
  const raw = el.value.trim(); if(!raw) return;
  G.busy=true; el.value='';
  const nrm  = normalize(raw);
  const ph   = PHASES[G.phase];
  const ok   = ph.aliases.some(a => normalize(a)===nrm || nrm.includes(normalize(a)) || normalize(a).includes(nrm));
  addMsg('player', `— "${raw}"`);
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás considera…</span>');
  showTyping();
  const txt = await bras(ok?'right_book':'wrong_book', {guess:raw});
  hideTyping(); addMsg('bras', txt);
  G.attempts++; G.busy=false;
  if (ok) { setTimeout(()=>advance(), 1800); }
  else    { G.hints<3 ? showBookInput() : setInteract(`<button class="btn-ghost" onclick="giveHint()">▸ VER MAIS UMA PISTA / REVELAR</button>`); }
}

async function revealBook() {
  G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás revela o segredo…</span>');
  showTyping();
  const txt = await bras('reveal_book');
  hideTyping(); addMsg('bras', txt);
  G.busy=false;
  setTimeout(()=>advance(), 1800);
}

async function advance() {
  G.phase++;
  if (G.phase >= 4) {
    G.phase = 3;
    addMsg('sys','✦ &nbsp; Os 4 livros foram descobertos — o enigma final aguarda &nbsp; ✦');
    await delay(1400);
    await startFinalEnigma();
    return;
  }
  addMsg('sys',`✦ &nbsp; Desafio ${G.phase} concluído — prepare-se para o próximo &nbsp; ✦`);
  dots();
  await delay(1400); startPhase();
}

/* ── ENIGMA FINAL — AMOR ── */
async function startFinalEnigma() {
  G.finalEnigma = true;
  document.getElementById('phase-strip').textContent = '🔐  ENIGMA FINAL — Os 4 Livros · Uma Palavra';
  showTyping();
  const intro = await bras('final_enigma_intro');
  hideTyping(); addMsg('bras', intro);
  await delay(900);

  const card = `<div class="enigma-card">
    <div class="enigma-title">⚔ &nbsp; ENIGMA FINAL &nbsp; ⚔</div>
    <div class="enigma-subtitle">Quatro livros. Quatro segredos. Uma palavra vos libertará.</div>
    <div class="enigma-item">
      <span class="enigma-num">I</span>
      <span class="enigma-text"><em>Triste Fim de Policarpo Quaresma</em> — Quaresma escreveu em língua tupi um pedido ao Parlamento para que o tupi fosse a língua oficial do Brasil. Como se chama esse tipo de documento — uma petição coletiva encaminhada a autoridades?</span>
    </div>
    <div class="enigma-item">
      <span class="enigma-num">II</span>
      <span class="enigma-text"><em>Iracema</em> — O nome da índia vem do tupi e significa "lábio de ____." Complete a lacuna.</span>
    </div>
    <div class="enigma-item">
      <span class="enigma-num">III</span>
      <span class="enigma-text"><em>Dom Casmurro</em> — Bentinho não comparou Capitu ao sol, nem à lua. Que parte do rosto dela ele exaltou como se fossem o próprio mar?</span>
    </div>
    <div class="enigma-item">
      <span class="enigma-num">IV</span>
      <span class="enigma-text"><em>O Cortiço</em> — Uma mulata dançarina seduziu o português Jerônimo e mudou sua vida para sempre. Qual era o seu nome?</span>
    </div>
    <div class="enigma-footer">Nas respostas encontrareis o enigma de 4 letras.<br>Descobri-lo e escrevê-lo num papel — depois, passem-no sob a porta.</div>
  </div>`;
  addMsg('sys', card);

  await delay(600);
  setInteract(`
    <div class="book-form">
      <div class="book-row">
        <input id="amor-in" type="text" placeholder="A palavra final…"
          onkeydown="if(event.key==='Enter')checkAMOR()"/>
        <button class="btn-confirm" onclick="checkAMOR()">CONFIRMAR</button>
      </div>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById('amor-in'); if(el)el.focus(); },100);
}

async function checkAMOR() {
  if(G.busy) return;
  const el = document.getElementById('amor-in'); if(!el) return;
  const raw = el.value.trim(); if(!raw) return;
  G.busy = true; el.value = '';
  const norm = normalize(raw);
  addMsg('player', `— "${raw}"`);

  if(norm === 'amor') {
    setInteract('');
    showTyping();
    const txt = await bras('victory');
    hideTyping(); addMsg('bras', txt);
    clearInterval(G.timer); G.busy=false;
    setTimeout(()=>{ document.getElementById('vtext').textContent=txt; confetti(); document.getElementById('victory').classList.add('show'); }, 2000);
  } else {
    setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás considera…</span>');
    showTyping();
    const txt = await bras('final_wrong', {guess:raw});
    hideTyping(); addMsg('bras', txt);
    G.busy = false;
    setTimeout(startPenalty, 800);
    await delay(800);
    setInteract(`
      <div class="book-form">
        <div class="book-row">
          <input id="amor-in" type="text" placeholder="Tente novamente…"
            onkeydown="if(event.key==='Enter')checkAMOR()"/>
          <button class="btn-confirm" onclick="checkAMOR()">CONFIRMAR</button>
        </div>
      </div>`);
    setTimeout(()=>{ const el=document.getElementById('amor-in'); if(el)el.focus(); },100);
  }
}

function timeUp() {
  addMsg('sys','⧖ O tempo esgotou-se. Como a vida de Brás Cubas — chegou ao fim sem aviso.');
  setInteract(`<button class="btn-ghost" style="max-width:260px" onclick="location.reload()">▸ TENTAR NOVAMENTE</button>`);
}

/* ═══════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════ */
function confetti() {
  const cols = ['#c9a227','#e8c84a','#ffffff','#a02020','#4a8a4a','#d4d4d4'];
  for (let i=0;i<70;i++){
    const c = document.createElement('div');
    const size = 6+Math.random()*6;
    c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}vw;top:-20px;
      width:${size}px;height:${size}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${2.5+Math.random()*2}s;
      animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ═══════════════════════════════════════════════
   START
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', init);
</script>
