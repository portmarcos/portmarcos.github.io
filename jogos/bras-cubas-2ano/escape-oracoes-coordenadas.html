<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Defunto Mestre — 2.º Ano</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#c9a227;--gold-lit:#e8c84a;--gold-dim:rgba(201,162,39,0.25);
      --bg:#060401;--bg2:#110b02;--bg3:#1c1205;
      --cream:#f0ddb0;--cream2:rgba(240,221,176,0.75);
      --blue:#4a6a8a;--blue-dim:rgba(74,106,138,0.25);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--cream);font-family:'IM Fell English',serif;display:flex;height:100vh}

    /* ═══ LEFT ═══ */
    #left{width:220px;min-width:220px;background:linear-gradient(170deg,#060401,#100900);border-right:1px solid var(--gold-dim);display:flex;flex-direction:column;align-items:center;padding:18px 14px;gap:14px}
    .candle{display:flex;flex-direction:column;align-items:center}
    .flame{width:11px;height:18px;background:radial-gradient(ellipse at 50% 85%,#ffcc00,#ff8800 55%,transparent);border-radius:50% 50% 30% 30%;animation:flicker 2.3s ease-in-out infinite;filter:blur(.5px);position:relative}
    .flame::after{content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:3px;height:5px;background:#555;border-radius:2px}
    .candlebody{width:16px;height:55px;background:linear-gradient(to right,#d0b880,#efe0b0,#d0b880);border-radius:2px}
    @keyframes flicker{0%,100%{transform:scaleX(1) scaleY(1) translateX(0);opacity:1}20%{transform:scaleX(.88) scaleY(1.1) translateX(-1px);opacity:.9}40%{transform:scaleX(1.08) scaleY(.93) translateX(1px);opacity:1}60%{transform:scaleX(.94) scaleY(1.06) translateX(0);opacity:.95}80%{transform:scaleX(1.04) scaleY(.97) translateX(-1px);opacity:.92}}
    #portrait{width:136px;height:170px;border:2px solid var(--gold);overflow:hidden;position:relative;box-shadow:0 0 24px rgba(201,162,39,.15),inset 0 0 30px rgba(0,0,0,.5)}
    #portrait svg{width:100%;height:100%}
    .section-label{font-family:'Cinzel',serif;font-size:.58rem;color:rgba(201,162,39,.5);letter-spacing:2.5px;text-align:center;text-transform:uppercase}
    .phase-dots{display:flex;gap:8px}
    .pdot{width:15px;height:15px;border:2px solid rgba(201,162,39,.3);border-radius:50%;transition:all .5s}
    .pdot.active{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px var(--gold)}
    .pdot.done{border-color:#4a8a4a;background:#4a8a4a}
    .qdots{display:flex;gap:6px}
    .qdot{width:11px;height:11px;border:1px solid rgba(201,162,39,.25);border-radius:50%;transition:.4s}
    .qdot.ok{background:#4a8a4a;border-color:#4a8a4a}
    .qdot.err{background:#7a2020;border-color:#7a2020}
    .qdot.cur{border-color:var(--gold);box-shadow:0 0 6px var(--gold)}
    #timer-wrap{margin-top:auto;text-align:center}
    #timer-lbl{font-family:'Cinzel',serif;font-size:.55rem;color:rgba(201,162,39,.4);letter-spacing:2px}
    #timer{font-family:'Cinzel Decorative',serif;font-size:1.55rem;color:var(--gold);letter-spacing:3px;transition:color .5s}
    #timer.warn{color:#e07820}
    #timer.danger{color:#cc2222;animation:blink 1s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

    /* ═══ RIGHT ═══ */
    #right{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #topbar{padding:9px 20px;border-bottom:1px solid var(--gold-dim);background:rgba(0,0,0,.35);display:flex;align-items:center;gap:14px}
    #topbar h1{font-family:'Cinzel Decorative',serif;font-size:.88rem;color:var(--gold);letter-spacing:2px}
    #topbar .sub{font-size:.72rem;color:rgba(201,162,39,.4);font-style:italic}
    #phase-strip{padding:5px 20px;border-bottom:1px solid var(--gold-dim);background:rgba(201,162,39,.04);font-family:'Cinzel',serif;font-size:.65rem;color:rgba(201,162,39,.55);letter-spacing:1px}
    #chat{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:13px;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
    #chat::-webkit-scrollbar{width:3px}
    #chat::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
    .msg{display:flex;gap:9px;max-width:92%;animation:slideUp .3s ease}
    .msg.bras{align-self:flex-start}
    .msg.player{align-self:flex-end;flex-direction:row-reverse}
    .msg.sys{align-self:center;max-width:75%}
    @keyframes slideUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .avatar{width:30px;min-width:30px;height:30px;border:1px solid;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.5px}
    .bras .avatar{border-color:var(--gold);color:var(--gold)}
    .player .avatar{border-color:var(--blue);color:var(--blue)}
    .bubble{padding:10px 14px;line-height:1.65;font-size:.88rem;border-radius:2px}
    .bras .bubble{background:linear-gradient(135deg,#1c1205,#130e03);border:1px solid rgba(201,162,39,.35);border-left:3px solid var(--gold);color:var(--cream)}
    .player .bubble{background:linear-gradient(135deg,#0a1520,#060e17);border:1px solid rgba(74,106,138,.35);border-right:3px solid var(--blue);color:#b8d0e8}
    .sys .bubble{background:rgba(201,162,39,.06);border:1px dashed rgba(201,162,39,.22);color:rgba(201,162,39,.65);font-style:italic;font-size:.78rem;text-align:center;padding:7px 14px}
    .sentence{margin-top:9px;padding:9px 13px;background:rgba(201,162,39,.06);border:1px solid rgba(201,162,39,.2);border-left:3px solid var(--gold);font-style:italic;font-size:.92rem}
    #typing{display:none;align-self:flex-start;padding:10px 14px;background:linear-gradient(135deg,#1c1205,#130e03);border:1px solid rgba(201,162,39,.3);border-left:3px solid var(--gold);border-radius:2px;animation:slideUp .3s}
    .dots{display:flex;gap:5px;align-items:center}
    .dots span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-8px);opacity:1}}

    /* ═══ INTERACT ═══ */
    #interact{border-top:1px solid var(--gold-dim);background:rgba(0,0,0,.2);padding:13px 20px;min-height:70px;display:flex;align-items:center;justify-content:center}
    .btn-row{display:flex;gap:10px;width:100%;max-width:540px}
    .btn-opt1{flex:1;padding:13px 8px;border:2px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:.22s;line-height:1.3}
    .btn-opt1:hover{background:var(--gold);color:var(--bg)}
    .btn-opt2{flex:1;padding:13px 8px;border:2px solid var(--blue);background:transparent;color:var(--blue);font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:.22s;line-height:1.3}
    .btn-opt2:hover{background:var(--blue);color:var(--bg)}
    .btn-ghost{width:100%;max-width:440px;padding:11px;border:1px solid rgba(201,162,39,.35);background:rgba(201,162,39,.05);color:var(--gold);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:2px;cursor:pointer;transition:.22s}
    .btn-ghost:hover{background:rgba(201,162,39,.12);border-color:var(--gold)}
    .book-form{display:flex;flex-direction:column;gap:9px;width:100%;max-width:500px}
    .book-row{display:flex;gap:8px}
    .book-row input{flex:1;padding:9px 13px;background:rgba(0,0,0,.5);border:1px solid rgba(201,162,39,.45);color:var(--cream);font-family:'IM Fell English',serif;font-size:.88rem;outline:none;transition:border-color .2s}
    .book-row input:focus{border-color:var(--gold)}
    .book-row input::placeholder{color:rgba(201,162,39,.3);font-style:italic}
    .btn-confirm{padding:9px 18px;background:var(--gold);color:var(--bg);border:none;font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:opacity .2s}
    .btn-confirm:hover{opacity:.85}

    /* ═══ PENALIDADE ═══ */
    #penalty{display:none;position:fixed;inset:0;z-index:600;background:rgba(4,0,0,.93);flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:40px;backdrop-filter:blur(3px)}
    #penalty.show{display:flex}
    .pen-skull{line-height:1}
    #skull-3d{width:190px;height:190px;object-fit:cover;border-radius:50%;border:3px solid rgba(201,162,39,.35);animation:skullFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(200,20,10,.6)) drop-shadow(0 0 8px rgba(201,162,39,.4))}
    @keyframes skullFloat{0%,100%{transform:translateY(0) scale(1) rotate(-2deg)}30%{transform:translateY(-14px) scale(1.04) rotate(1deg)}60%{transform:translateY(-8px) scale(1.02) rotate(-1deg)}}
    .pen-title{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:#c9a227;letter-spacing:4px}
    .pen-quote{font-family:'IM Fell English',serif;font-style:italic;color:rgba(240,221,176,.75);max-width:440px;line-height:1.7;font-size:.95rem}
    #pen-cd{font-family:'Cinzel Decorative',serif;font-size:4rem;color:#cc2222;letter-spacing:6px;animation:cdPulse 1s ease-in-out infinite}
    @keyframes cdPulse{0%,100%{text-shadow:0 0 10px #cc2222}50%{text-shadow:0 0 30px #cc2222,0 0 60px #880000}}
    .pen-sub{font-family:'Cinzel',serif;font-size:.65rem;color:rgba(201,162,39,.4);letter-spacing:3px}
    #mute-btn{position:fixed;bottom:14px;right:14px;z-index:400;width:36px;height:36px;background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.3);color:rgba(201,162,39,.6);font-size:1rem;cursor:pointer;border-radius:2px;transition:.2s;display:flex;align-items:center;justify-content:center}
    #mute-btn:hover{background:rgba(201,162,39,.2);color:var(--gold)}

    /* ═══ ENIGMA FINAL ═══ */
    .enigma-card{background:linear-gradient(145deg,#1c1205,#0e0900);border:2px solid var(--gold);border-radius:2px;padding:20px 22px;margin-top:10px;font-family:'IM Fell English',serif;width:100%}
    .enigma-title{font-family:'Cinzel Decorative',serif;color:var(--gold);text-align:center;font-size:.92rem;letter-spacing:3px;margin-bottom:6px}
    .enigma-divider{border:none;border-top:1px solid rgba(201,162,39,.25);margin:10px 0}
    .enigma-subtitle{text-align:center;font-style:italic;color:rgba(240,221,176,.55);font-size:.8rem;margin-bottom:16px}
    .enigma-item{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start}
    .enigma-num{font-family:'Cinzel',serif;color:var(--gold);font-size:.88rem;font-weight:700;min-width:22px;padding-top:2px}
    .enigma-text{font-size:.86rem;color:rgba(240,221,176,.8);line-height:1.6}
    .enigma-text em{color:var(--gold);font-style:italic}
    .enigma-footer{margin-top:14px;padding-top:12px;border-top:1px solid rgba(201,162,39,.2);text-align:center;font-style:italic;color:rgba(240,221,176,.55);font-size:.8rem;line-height:1.6}

    /* ═══ VITÓRIA ═══ */
    #victory{display:none;position:fixed;inset:0;background:rgba(3,2,0,.94);z-index:200;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:18px;padding:40px}
    #victory.show{display:flex}
    #victory h1{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--gold);letter-spacing:5px}
    #victory p{font-size:1rem;color:var(--cream2);max-width:520px;line-height:1.75}
    .ornament{color:var(--gold);letter-spacing:10px;font-size:1.1rem}
    .confetti{position:fixed;z-index:300;pointer-events:none;animation:fall linear forwards}
    @keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(105vh) rotate(720deg);opacity:0}}
    @media(max-width:680px){#left{display:none}}
  </style>
</head>
<body>

<!-- LEFT -->
<div id="left">
  <div class="candle"><div class="flame"></div><div class="candlebody"></div></div>
  <div id="portrait">
    <svg viewBox="0 0 136 170" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="crG" cx="34%" cy="24%" r="72%"><stop offset="0%" stop-color="#faf2dc"/><stop offset="38%" stop-color="#e2d4a8"/><stop offset="72%" stop-color="#bca878"/><stop offset="100%" stop-color="#8c7850"/></radialGradient>
        <radialGradient id="jawG" cx="38%" cy="22%" r="68%"><stop offset="0%" stop-color="#e8dab8"/><stop offset="100%" stop-color="#9a8860"/></radialGradient>
        <radialGradient id="eyeR" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#cc2200" stop-opacity=".35"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>
        <radialGradient id="sockG" cx="28%" cy="28%" r="70%"><stop offset="0%" stop-color="#120804"/><stop offset="100%" stop-color="#030201"/></radialGradient>
        <linearGradient id="toothG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ede5c5"/><stop offset="100%" stop-color="#a89868"/></linearGradient>
        <filter id="df" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="4" dy="6" stdDeviation="6" flood-opacity=".65"/></filter>
      </defs>
      <g filter="url(#df)">
        <path d="M 46,167 Q 43,200 63,211 Q 80,219 100,219 Q 120,219 137,211 Q 157,200 154,167 Q 130,174 100,174 Q 70,174 46,167 Z" fill="url(#jawG)" stroke="#887560" stroke-width="1.2"/>
        <g fill="url(#toothG)" stroke="#907a58" stroke-width=".7"><rect x="59" y="160" width="12" height="14" rx="2"/><rect x="72" y="157" width="14" height="17" rx="2"/><rect x="87" y="156" width="14" height="18" rx="2"/><rect x="102" y="156" width="14" height="18" rx="2"/><rect x="117" y="157" width="14" height="17" rx="2"/><rect x="132" y="160" width="12" height="14" rx="2"/></g>
        <ellipse cx="100" cy="91" rx="83" ry="88" fill="url(#crG)" stroke="#887560" stroke-width="1.8"/>
        <path d="M 24,128 Q 16,160 46,170 Q 68,176 100,175 Q 132,176 154,170 Q 184,160 176,128 Q 150,146 100,146 Q 50,146 24,128 Z" fill="url(#crG)" stroke="#907862" stroke-width="1"/>
        <path d="M 30,102 Q 64,80 100,78 Q 136,80 170,102" stroke="#a09070" stroke-width="5" fill="none" stroke-linecap="round" opacity=".55"/>
        <path d="M 100,8 Q 113,36 116,67 Q 117,84 100,91" stroke="#a09070" stroke-width="1.2" fill="none" opacity=".4" stroke-dasharray="3,2.5"/>
        <path d="M 22,82 Q 60,94 100,95 Q 140,94 178,82" stroke="#a09070" stroke-width="1" fill="none" opacity=".32" stroke-dasharray="4,2"/>
        <ellipse cx="70" cy="46" rx="28" ry="20" fill="#ffffff" opacity=".18" transform="rotate(-20 70 46)"/>
        <ellipse cx="58" cy="36" rx="14" ry="9" fill="#ffffff" opacity=".25" transform="rotate(-15 58 36)"/>
        <ellipse cx="67" cy="108" rx="32" ry="27" fill="#0a0604" stroke="#7a6a48" stroke-width="2"/>
        <ellipse cx="65" cy="109" rx="22" ry="18" fill="#040201"/>
        <ellipse cx="67" cy="108" rx="20" ry="16" fill="url(#eyeR)"/>
        <path d="M 38,99 Q 54,86 84,97" stroke="#ccc0a0" stroke-width="1.8" fill="none" opacity=".55" stroke-linecap="round"/>
        <ellipse cx="133" cy="108" rx="32" ry="27" fill="#0a0604" stroke="#7a6a48" stroke-width="2"/>
        <ellipse cx="135" cy="110" rx="22" ry="18" fill="#040201"/>
        <ellipse cx="133" cy="108" rx="20" ry="16" fill="url(#eyeR)"/>
        <path d="M 114,99 Q 130,86 162,96" stroke="#ccc0a0" stroke-width="1.8" fill="none" opacity=".45" stroke-linecap="round"/>
        <path d="M 100,133 L 86,153 Q 92,159 100,158 Q 108,159 114,153 Z" fill="#050201" stroke="#7a6a48" stroke-width="1.2"/>
        <line x1="100" y1="133" x2="100" y2="157" stroke="#1a1206" stroke-width="1.3" opacity=".65"/>
      </g>
    </svg>
  </div>
  <div class="section-label">DESAFIO</div>
  <div class="phase-dots">
    <div class="pdot" id="pd0"></div><div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div><div class="pdot" id="pd3"></div>
  </div>
  <div class="section-label">QUESTÕES</div>
  <div class="qdots">
    <div class="qdot" id="qd0"></div><div class="qdot" id="qd1"></div>
    <div class="qdot" id="qd2"></div><div class="qdot" id="qd3" style="display:none"></div>
  </div>
  <div class="candle"><div class="flame"></div><div class="candlebody"></div></div>
  <div id="timer-wrap"><div id="timer-lbl">TEMPO</div><div id="timer">30:00</div></div>
</div>

<!-- RIGHT -->
<div id="right">
  <div id="topbar">
    <h1>O DEFUNTO MESTRE · 2.º ANO</h1>
    <span class="sub">— Frase, Período e Orações Coordenadas —</span>
  </div>
  <div id="phase-strip">📜 &nbsp;LÍNGUA PORTUGUESA · 2.º Ano · Frase, Período e Orações Coordenadas</div>
  <div id="chat">
    <div id="typing"><div class="dots"><span></span><span></span><span></span></div></div>
  </div>
  <div id="interact">
    <span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Invocando o defunto autor…</span>
  </div>
</div>

<!-- PENALIDADE -->
<div id="penalty">
  <div class="pen-skull">
    <svg id="skull-3d" viewBox="0 0 200 228" xmlns="http://www.w3.org/2000/svg" style="width:190px;height:190px;filter:drop-shadow(0 0 28px rgba(200,20,10,0.6))">
      <defs>
        <radialGradient id="sg1" cx="34%" cy="24%" r="72%"><stop offset="0%" stop-color="#faf2dc"/><stop offset="38%" stop-color="#e2d4a8"/><stop offset="72%" stop-color="#bca878"/><stop offset="100%" stop-color="#8c7850"/></radialGradient>
        <radialGradient id="sg2" cx="38%" cy="22%" r="68%"><stop offset="0%" stop-color="#e8dab8"/><stop offset="100%" stop-color="#9a8860"/></radialGradient>
        <radialGradient id="er" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#cc2200" stop-opacity=".35"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>
        <linearGradient id="tg2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ede5c5"/><stop offset="100%" stop-color="#a89868"/></linearGradient>
        <filter id="sf"><feDropShadow dx="4" dy="6" stdDeviation="6" flood-opacity=".65"/></filter>
      </defs>
      <g filter="url(#sf)">
        <path d="M 46,167 Q 43,200 63,211 Q 80,219 100,219 Q 120,219 137,211 Q 157,200 154,167 Q 130,174 100,174 Q 70,174 46,167 Z" fill="url(#sg2)" stroke="#887560" stroke-width="1.2"/>
        <g fill="url(#tg2)" stroke="#907a58" stroke-width=".7"><rect x="59" y="160" width="12" height="14" rx="2"/><rect x="72" y="157" width="14" height="17" rx="2"/><rect x="87" y="156" width="14" height="18" rx="2"/><rect x="102" y="156" width="14" height="18" rx="2"/><rect x="117" y="157" width="14" height="17" rx="2"/><rect x="132" y="160" width="12" height="14" rx="2"/></g>
        <ellipse cx="100" cy="91" rx="83" ry="88" fill="url(#sg1)" stroke="#887560" stroke-width="1.8"/>
        <path d="M 24,128 Q 16,160 46,170 Q 68,176 100,175 Q 132,176 154,170 Q 184,160 176,128 Q 150,146 100,146 Q 50,146 24,128 Z" fill="url(#sg1)" stroke="#907862" stroke-width="1"/>
        <path d="M 30,102 Q 64,80 100,78 Q 136,80 170,102" stroke="#a09070" stroke-width="5" fill="none" stroke-linecap="round" opacity=".55"/>
        <path d="M 100,8 Q 113,36 116,67 Q 117,84 100,91" stroke="#a09070" stroke-width="1.2" fill="none" opacity=".4" stroke-dasharray="3,2.5"/>
        <ellipse cx="67" cy="108" rx="32" ry="27" fill="#0a0604" stroke="#7a6a48" stroke-width="2"/>
        <ellipse cx="65" cy="109" rx="22" ry="18" fill="#040201"/>
        <ellipse cx="67" cy="108" rx="20" ry="16" fill="url(#er)"/>
        <ellipse cx="133" cy="108" rx="32" ry="27" fill="#0a0604" stroke="#7a6a48" stroke-width="2"/>
        <ellipse cx="135" cy="110" rx="22" ry="18" fill="#040201"/>
        <ellipse cx="133" cy="108" rx="20" ry="16" fill="url(#er)"/>
        <path d="M 100,133 L 86,153 Q 92,159 100,158 Q 108,159 114,153 Z" fill="#050201" stroke="#7a6a48" stroke-width="1.2"/>
        <line x1="100" y1="133" x2="100" y2="157" stroke="#1a1206" stroke-width="1.3" opacity=".65"/>
      </g>
    </svg>
  </div>
  <div class="pen-title">PENITÊNCIA</div>
  <p id="pen-time-lbl" style="font-family:'Cinzel',serif;font-size:.72rem;color:rgba(204,34,34,.75);letter-spacing:3px;margin:-8px 0 0"></p>

let audioCtx=null,masterGain=null,muted=false;
function startMusic(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    audioCtx=new AC();masterGain=audioCtx.createGain();
    masterGain.gain.value=0.12;masterGain.connect(audioCtx.destination);
    playLoop();
  }catch(e){}
}
function toggleMute(){
  if(!audioCtx)return;muted=!muted;
  masterGain.gain.setTargetAtTime(muted?0:0.12,audioCtx.currentTime,0.3);
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
}
const BPM=50,BEAT=60/BPM;
const FREQ={Bb2:116.54,F3:174.61,Bb3:233.08,C4:261.63,Db4:277.18,Eb4:311.13,F4:349.23};
const MELODY=[['Bb3',.5],['Bb3',.5],['Bb3',.5],['F3',1.5],['Bb3',.5],['Bb3',.5],['Bb3',.5],['F3',1.5],['Bb3',.33],['C4',.33],['Db4',.67],['Eb4',.5],['F4',.75],['F4',.25],['Eb4',.5],['Db4',.5],['Eb4',.5],['F4',.5],['Bb3',2],[null,2]];
const BASS=[['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['Bb2',1],['F3',1],['F3',1],['Bb2',2],[null,2]];
function playOrganNote(freq,t,dur,vol=1){
  if(!audioCtx||!freq)return;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.05*vol,t+0.08);
  g.gain.setValueAtTime(0.05*vol,t+dur-0.12);g.gain.linearRampToValueAtTime(0,t+dur);
  g.connect(masterGain);
  [1,2,3,4].forEach((h,i)=>{
    const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=freq*h;
    const hg=audioCtx.createGain();hg.gain.value=[1,.55,.25,.1][i];
    o.connect(hg);hg.connect(g);o.start(t);o.stop(t+dur+0.2);
  });
}
function playLoop(){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime+0.15;let mt=t0,bt=t0;
  MELODY.forEach(([n,d])=>{playOrganNote(FREQ[n],mt,d*BEAT*0.88,1.0);mt+=d*BEAT;});
  BASS.forEach(([n,d])=>{playOrganNote(FREQ[n],bt,d*BEAT*0.7,0.55);bt+=d*BEAT;});
  const total=MELODY.reduce((s,[,d])=>s+d,0)*BEAT*1000;
  setTimeout(playLoop,total-200);
}

    `O livro é Fala Sério, Mãe!, de Thalita Rebouças. O bilhete está dentro do livro. E agora — o enigma final.`,
  ];

  const FINAL_ENIGMA=`Quatro livros percorridos, quatro segredos arrancados do silêncio. Mas o jogo ainda não terminou — reservei para o final o enigma que exige não apenas memória, mas inteligência. Cada livro guarda uma resposta. Nas respostas, encontrareis o enigma de 4 letras. Descobri-lo. Escrevam-no num papel — e passem-no por baixo da porta.`;

  const FINAL_WRONG=[
    `"${extra.guess||'?'}" — não é essa a palavra. Releiam as quatro perguntas. Cada livro tem uma resposta simples, de uma palavra. Pensem: qual o nome da cachorra de Fabiano? Qual artigo precede "Quinze"? Qual o nome da autora do diário da favela? Qual o nome da mãe superprotetora?`,
    `Não. Quatro perguntas, quatro respostas de uma palavra cada. O enigma está nelas. Não procurem complicar o que é simples.`,
    `Incorreto. Quatro respostas, quatro palavras. Olhem para as iniciais. O enigma está ali.`,
  ];

  const VICTORY=`E assim — com inteligência que me orgulha — descobristes a palavra. BOCA. A boca de Baleia que não podia falar, o O de O Quinze que gritou a seca ao Brasil, a voz de Carolina que o mundo finalmente ouviu, e Ângela que falou demais de amor. A literatura, meus caros, é a boca dos que não têm voz. Parabéns. Podeis abrir a porta.`;

  const MAP={
    intro:INTRO, phase_intro:PHASE_INTRO[pi], q_intro:pick(Q_INTRO),
    correct:correctR(), wrong:wrongR(), qs_done:QS_DONE[pi],
    hint:hintR(), wrong_book:pick(WRONG_BOOK),
    right_book:RIGHT_BOOK[pi], reveal_book:REVEAL_BOOK[pi],
    final_enigma_intro:FINAL_ENIGMA, final_wrong:pick(FINAL_WRONG),
    victory:VICTORY,
  };
  return new Promise(resolve=>setTimeout(()=>resolve(MAP[situation]||'Brás Cubas pondera.'),500+Math.random()*700));
}

/* ═══════════════════════════════════════════════
   FLUXO DO JOGO
═══════════════════════════════════════════════ */
async function init(){
  dots();startTimer();
  document.addEventListener('click',()=>{if(!audioCtx)startMusic();},{once:true});
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Invocando o defunto autor…</span>');
  showTyping();const txt=await bras('intro');
  hideTyping();addMsg('bras',txt);
  await delay(1200);startPhase();
}

async function startPhase(){
  G.qIdx=0;G.hints=0;G.qsDone=false;G.bookMode=false;G.attempts=0;G.answered=[];
  dots();
  document.getElementById('phase-strip').textContent=PHASES[Math.min(G.phase,3)].strip;
  showTyping();const txt=await bras('phase_intro');
  hideTyping();addMsg('bras',txt);
  await delay(1100);askQuestion();
}

async function askQuestion(){
  if(G.busy)return;dots();
  const q=PHASES[G.phase].qs[G.qIdx];
  showTyping();const txt=await bras('q_intro');
  hideTyping();
  addMsg('bras',txt,sentence(q));
  setInteract(`
    <div class="btn-row">
      <button class="btn-opt1" onclick="answer(0)">${q.opt1}</button>
      <button class="btn-opt2" onclick="answer(1)">${q.opt2}</button>
    </div>`);
}

async function answer(idx){
  if(G.busy)return;G.busy=true;
  const q=PHASES[G.phase].qs[G.qIdx];
  const ok=(idx===q.correct);
  addMsg('player',`— ${idx===0?q.opt1:q.opt2}`);
  G.answered.push(ok);dots();
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás pondera…</span>');
  showTyping();
  const txt=await bras(ok?'correct':'wrong',{label:q.label,rule:q.rule});
  hideTyping();addMsg('bras',txt);
  G.qIdx++;G.busy=false;
  if(!ok)setTimeout(startPenalty,800);
  const totalQs=PHASES[G.phase].qs.length;
  if(G.qIdx<totalQs){
    setInteract(`<button class="btn-ghost" onclick="askQuestion()">▸ PRÓXIMA QUESTÃO</button>`);
  } else {
    G.qsDone=true;dots();
    setInteract(`<button class="btn-ghost" onclick="transHints()">▸ RECEBER PRIMEIRA PISTA</button>`);
  }
}

async function transHints(){
  if(G.busy)return;G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás prepara a pista…</span>');
  showTyping();const txt=await bras('qs_done');
  hideTyping();addMsg('bras',txt);
  G.busy=false;
  setInteract(`<button class="btn-ghost" onclick="giveHint()">▸ VER PISTA Nº 1</button>`);
}

async function giveHint(){
  if(G.busy)return;
  if(G.hints>=3){revealBook();return;}
  G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás sussurra do além…</span>');
  showTyping();const txt=await bras('hint');
  hideTyping();addMsg('bras',txt);
  G.hints++;G.bookMode=true;G.busy=false;
  showBookInput();
}

function showBookInput(){
  const nextLabel=G.hints<3?`▸ PISTA Nº ${G.hints+1}`:'▸ REVELAR O LIVRO';
  setInteract(`
    <div class="book-form">
      <div class="book-row">
        <input id="bi" type="text" placeholder="Digite o título do livro…"
          onkeydown="if(event.key==='Enter')guessBook()"/>
        <button class="btn-confirm" onclick="guessBook()">CONFIRMAR</button>
      </div>
      <button class="btn-ghost" onclick="giveHint()">${nextLabel}</button>
    </div>`);
  setTimeout(()=>{const el=document.getElementById('bi');if(el)el.focus();},80);
}

async function guessBook(){
  if(G.busy)return;
  const el=document.getElementById('bi');if(!el)return;
  const raw=el.value.trim();if(!raw)return;
  G.busy=true;el.value='';
  const nrm=normalize(raw);
  const ph=PHASES[G.phase];
  const ok=ph.aliases.some(a=>normalize(a)===nrm||nrm.includes(normalize(a))||normalize(a).includes(nrm));
  addMsg('player',`— "${raw}"`);
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás considera…</span>');
  showTyping();const txt=await bras(ok?'right_book':'wrong_book',{guess:raw});
  hideTyping();addMsg('bras',txt);
  G.attempts++;G.busy=false;
  if(ok){setTimeout(()=>advance(),1800);}
  else{G.hints<3?showBookInput():setInteract(`<button class="btn-ghost" onclick="giveHint()">▸ MAIS UMA PISTA / REVELAR</button>`);}
}

async function revealBook(){
  G.busy=true;
  setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás revela o segredo…</span>');
  showTyping();const txt=await bras('reveal_book');
  hideTyping();addMsg('bras',txt);
  G.busy=false;setTimeout(()=>advance(),1800);
}

async function advance(){
  G.phase++;
  if(G.phase>=4){
    G.phase=3;
    addMsg('sys','✦ &nbsp; Os 4 livros foram descobertos — o enigma final aguarda &nbsp; ✦');
    await delay(1400);await startFinalEnigma();return;
  }
  addMsg('sys',`✦ &nbsp; Desafio ${G.phase} concluído — prepare-se para o próximo &nbsp; ✦`);
  dots();await delay(1400);startPhase();
}

async function startFinalEnigma(){
  G.finalEnigma=true;
  document.getElementById('phase-strip').textContent='🔐  ENIGMA FINAL — Os 4 Livros · Uma Palavra';
  showTyping();const intro=await bras('final_enigma_intro');
  hideTyping();addMsg('bras',intro);
  await delay(900);
  const card=`<div class="enigma-card">
    <div class="enigma-title">⚔ &nbsp; ENIGMA FINAL &nbsp; ⚔</div>
    <hr class="enigma-divider"/>
    <div class="enigma-subtitle">Quatro livros. Quatro segredos. Uma palavra vos libertará.</div>
    <div class="enigma-item"><span class="enigma-num">I</span><span class="enigma-text"><em>Vidas Secas</em> — Qual o nome da cachorra de Fabiano, o ser mais emotivo do livro?</span></div>
    <div class="enigma-item"><span class="enigma-num">II</span><span class="enigma-text"><em>O Quinze</em> — Qual artigo completa o título: ___ Quinze?</span></div>
    <div class="enigma-item"><span class="enigma-num">III</span><span class="enigma-text"><em>Quarto de Despejo</em> — Qual o primeiro nome da autora que escreveu um diário sobre a vida na favela?</span></div>
    <div class="enigma-item"><span class="enigma-num">IV</span><span class="enigma-text"><em>Fala Sério, Mãe!</em> — Qual o nome da mãe superprotetora do livro de Thalita Rebouças?</span></div>
    <div class="enigma-footer">Nas respostas encontrareis o enigma de 4 letras.<br>Descobri-lo e escrevê-lo num papel — depois, passem-no sob a porta.</div>
  </div>`;
  addMsg('sys',card);
  await delay(600);
  setInteract(`
    <div class="book-form">
      <div class="book-row">
        <input id="amor-in" type="text" placeholder="A palavra final…"
          onkeydown="if(event.key==='Enter')checkFinal()"/>
        <button class="btn-confirm" onclick="checkFinal()">CONFIRMAR</button>
      </div>
    </div>`);
  setTimeout(()=>{const el=document.getElementById('amor-in');if(el)el.focus();},100);
}

async function checkFinal(){
  if(G.busy)return;
  const el=document.getElementById('amor-in');if(!el)return;
  const raw=el.value.trim();if(!raw)return;
  G.busy=true;el.value='';
  const norm=normalize(raw);
  addMsg('player',`— "${raw}"`);
  if(norm==='boca'){
    setInteract('');
    showTyping();const txt=await bras('victory');
    hideTyping();addMsg('bras',txt);
    clearInterval(G.timer);G.busy=false;
    setTimeout(()=>{document.getElementById('vtext').textContent=txt;confetti();document.getElementById('victory').classList.add('show');},2000);
  } else {
    setInteract('<span style="color:rgba(201,162,39,.3);font-style:italic;font-size:.82rem;">Brás considera…</span>');
    showTyping();const txt=await bras('final_wrong',{guess:raw});
    hideTyping();addMsg('bras',txt);
    G.busy=false;setTimeout(startPenalty,800);
    await delay(800);
    setInteract(`
      <div class="book-form">
        <div class="book-row">
          <input id="amor-in" type="text" placeholder="Tente novamente…"
            onkeydown="if(event.key==='Enter')checkFinal()"/>
          <button class="btn-confirm" onclick="checkFinal()">CONFIRMAR</button>
        </div>
      </div>`);
    setTimeout(()=>{const el=document.getElementById('amor-in');if(el)el.focus();},100);
  }
}

function timeUp(){
  addMsg('sys','⧖ O tempo esgotou-se. Como a vida de Brás Cubas — chegou ao fim sem aviso.');
  setInteract(`<button class="btn-ghost" style="max-width:260px" onclick="location.reload()">▸ TENTAR NOVAMENTE</button>`);
}
function confetti(){
  const cols=['#c9a227','#e8c84a','#ffffff','#a02020','#4a8a4a','#d4d4d4'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');const size=6+Math.random()*6;
    c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),5000);
  }
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

document.addEventListener('DOMContentLoaded',init);
</script>
