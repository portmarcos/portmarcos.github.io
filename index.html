<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal de Aulas — Prof. Marcos</title>
  <meta name="description" content="Atividades interativas de Português, Informática Técnica e Artes.">

  <!-- Open Graph: preview bonito quando o link é enviado no WhatsApp -->
  <meta property="og:title" content="Portal de Aulas — Prof. Marcos">
  <meta property="og:description" content="Quizzes, flashcards, escape rooms e jogos de Português, Informática e Artes.">
  <meta property="og:image" content="https://portmarcos.github.io/assets/img/og-capa.png">
  <meta property="og:url" content="https://portmarcos.github.io/">
  <meta property="og:type" content="website">

  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B2430">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/design-system.css">
</head>
<body>

  <div class="barra-tricolor"></div>

  <header class="cabecalho">
    <div class="container cabecalho-conteudo">
      <span class="marca"><a href="./">Portal de Aulas</a></span>
      <span class="sub">Prof. Marcos · Português · Informática · Artes</span>
    </div>
  </header>

  <main class="container">

    <!-- Busca -->
    <input id="campo-busca" class="busca" type="search"
           placeholder="Buscar atividade… (ex.: crase, Linux, bingo)"
           aria-label="Buscar atividade">

    <!-- Filtro por matéria -->
    <div class="linha-chips" role="group" aria-label="Filtrar por matéria" style="margin-top:14px">
      <button class="chip ativo" data-filtro-materia="todas">Todas</button>
      <button class="chip" data-filtro-materia="portugues"  data-cor="verde">Português</button>
      <button class="chip" data-filtro-materia="informatica" data-cor="azul">Informática</button>
      <button class="chip" data-filtro-materia="artes"       data-cor="laranja">Artes</button>
    </div>

    <!-- Filtro por ano/turma -->
    <div class="linha-chips" role="group" aria-label="Filtrar por ano" style="margin-top:8px">
      <button class="chip ativo" data-filtro-ano="todos">Todos os anos</button>
      <button class="chip" data-filtro-ano="6º">6º</button>
      <button class="chip" data-filtro-ano="7º">7º</button>
      <button class="chip" data-filtro-ano="8º">8º</button>
      <button class="chip" data-filtro-ano="9º">9º</button>
      <button class="chip" data-filtro-ano="1EM">1º EM</button>
      <button class="chip" data-filtro-ano="2EM">2º EM</button>
      <button class="chip" data-filtro-ano="3EM">3º EM</button>
    </div>

    <!-- As atividades são desenhadas aqui pelo JavaScript -->
    <div id="grade" class="grade-cards" style="margin-top:22px"></div>
    <p id="vazio" class="estado-vazio" hidden>Nenhuma atividade encontrada. Tente outro filtro ou busca.</p>

  </main>

  <footer class="rodape">
    <div class="container">
      Portal de Aulas · Prof. Marcos · Santo Antônio do Retiro – MG
    </div>
  </footer>

<script>
/* ============================================================
   CATÁLOGO DE ATIVIDADES
   Para adicionar uma atividade nova: copie um bloco { ... },
   ajuste os campos e pronto — o card aparece sozinho.

   materia: "portugues" | "informatica" | "artes"
   anos:    lista entre ["6º","7º","8º","9º","1EM","2EM","3EM"]
   tipo:    texto livre com emoji (aparece no topo do card)
   tempo:   duração estimada (texto livre)
   url:     caminho do arquivo da atividade
   novo:    true mostra o selo NOVO
   ============================================================ */
const ATIVIDADES = [
  {
    titulo: "Quiz — Pré-Modernismo Brasileiro",
    materia: "portugues",
    anos: ["2EM", "3EM"],
    tipo: "🎮 Quiz cronometrado",
    tempo: "10 min",
    url: "atividades/quiz-premodernismo.html",
    novo: true
  },
  {
    titulo: "Flashcards — Comandos do Linux Mint",
    materia: "informatica",
    anos: ["1EM", "2EM", "3EM"],
    tipo: "🃏 Flashcards",
    tempo: "8 min",
    url: "atividades/flashcards-linux.html",
    novo: true
  },

  { titulo: "Escape Room — Malware e Cibersegurança",
    materia: "informatica",
    anos: ["1EM"],
    tipo: "🔐 Escape room",
    tempo: "30 min",
    url: "informatica/",
    novo: false
  },
  {
    titulo: "Escape Room — Crase e Regência Verbal",
    materia: "portugues",
    anos: ["1EM", "2EM"],
    tipo: "🔐 Escape room",
    tempo: "30 min",
    url: "portugues/",
    novo: false
  },
  {
    titulo: "Escape Room — Policarpo Quaresma",
    materia: "portugues",
    anos: ["2EM", "3EM"],
    tipo: "🔐 Escape room",
    tempo: "30 min",
    url: "portugues/",
    novo: false
  },
  {
    titulo: "Bingo — Arte Rupestre",
    materia: "artes",
    anos: ["6º"],
    tipo: "🎰 Bingo",
    tempo: "25 min",
    url: "artes/",
    novo: false
  },
  {
    titulo: "Fato ou Opinião?",
    materia: "portugues",
    anos: ["8º", "9º"],
    tipo: "📋 Atividade guiada",
    tempo: "20 min",
    url: "portugues/",
    novo: false
  }
];

/* ---------- Estado dos filtros ---------- */
let filtroMateria = "todas";
let filtroAno = "todos";
let textoBusca = "";

const grade = document.getElementById("grade");
const vazio = document.getElementById("vazio");

/* Remove acentos para a busca achar "pre" em "Pré" */
const normalizar = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

/* ---------- Desenha os cards conforme os filtros ---------- */
function desenhar() {
  const termo = normalizar(textoBusca);
  const visiveis = ATIVIDADES.filter(a =>
    (filtroMateria === "todas" || a.materia === filtroMateria) &&
    (filtroAno === "todos"     || a.anos.includes(filtroAno)) &&
    (termo === ""              || normalizar(a.titulo).includes(termo))
  );

  grade.innerHTML = visiveis.map(a => `
    <a class="card-atividade" data-materia="${a.materia}" href="${a.url}">
      ${a.novo ? '<span class="badge-novo">NOVO</span>' : ""}
      <div class="card-topo"><span class="card-tipo">${a.tipo}</span></div>
      <div class="card-titulo">${a.titulo}</div>
      <div class="card-meta">
        ${a.anos.map(ano => `<span class="tag">${ano}</span>`).join("")}
        <span class="tag">⏱ ${a.tempo}</span>
      </div>
    </a>
  `).join("");

  vazio.hidden = visiveis.length > 0;
}

/* ---------- Liga os chips e a busca ---------- */
function ligarChips(atributo, aoEscolher) {
  document.querySelectorAll(`[${atributo}]`).forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(`[${atributo}]`).forEach(c => c.classList.remove("ativo"));
      chip.classList.add("ativo");
      aoEscolher(chip.getAttribute(atributo));
      desenhar();
    });
  });
}
ligarChips("data-filtro-materia", v => filtroMateria = v);
ligarChips("data-filtro-ano",     v => filtroAno = v);

document.getElementById("campo-busca").addEventListener("input", e => {
  textoBusca = e.target.value;
  desenhar();
});

desenhar();
</script>
</body>
</html>
